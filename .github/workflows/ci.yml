name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o build/bin/certify ./cmd/certify/

  certify:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          go build -ldflags "\
            -X main.Version=0.1.0 \
            -X main.Commit=$(git rev-parse --short HEAD) \
            -X main.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o build/bin/certify ./cmd/certify/

      - name: Certify
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          ./build/bin/certify scan
          ./build/bin/certify certify --reset-queue

      - name: Commit report card
        run: |
          git config user.name "certify[bot]"
          git config user.email "certify@users.noreply.github.com"
          git add .certification/REPORT_CARD.md .certification/badge.json
          git diff --staged --quiet || git commit -m "chore: update report card [skip ci]"
          git push
