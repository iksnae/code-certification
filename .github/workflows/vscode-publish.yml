name: Publish VSCode Extension

on:
  push:
    tags:
      - 'vscode-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-certify

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::VSCE_PAT secret not set"
            exit 1
          fi
          if npx @vscode/vsce publish --no-dependencies -p "$VSCE_PAT" 2>&1 | tee /tmp/vsce-output; then
            echo "✅ Published successfully"
          elif grep -q "already exists" /tmp/vsce-output; then
            echo "::notice::Version already published — skipping"
          else
            echo "::error::Publish failed"
            exit 1
          fi

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: certify-vscode
          path: vscode-certify/*.vsix
