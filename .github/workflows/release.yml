name: Release

on:
  push:
    tags:
      - 'v*'
      - '!vscode-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: certify-linux-amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            artifact: certify-linux-arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
            artifact: certify-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: certify-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: certify-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.Date=${DATE}"
          go build -ldflags "${LDFLAGS}" -o dist/${{ matrix.artifact }} ./cmd/certify/
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Test
        run: go test ./... -count=1

  release:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          chmod +x dist/certify-linux-* dist/certify-darwin-* || true
          gh release create "${VERSION}" \
            --title "Certify ${VERSION}" \
            --notes-file RELEASE_NOTES.md \
            dist/*
