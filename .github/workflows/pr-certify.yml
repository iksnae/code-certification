name: Certification PR Review

on:
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.py'

concurrency:
  group: pr-certify-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  certify-changed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build certify
        run: |
          go build -ldflags "\
            -X main.Version=$(git describe --tags --always) \
            -X main.Commit=$(git rev-parse --short HEAD) \
            -X main.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o build/bin/certify ./cmd/certify/

      - name: Scan
        run: ./build/bin/certify scan

      - name: Certify changed files only
        run: ./build/bin/certify certify --diff-base origin/main --skip-agent

      - name: Generate report
        run: ./build/bin/certify report
