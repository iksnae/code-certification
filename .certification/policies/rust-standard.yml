name: rust-standard
version: "1.0.0"
language: rs

# Note: func_lines, param_count, max_nesting_depth, unsafe_blocks require
# language-specific structural analysis (not yet implemented for Rust).
# Add those rules when Rust structural analysis lands.

rules:
  - id: lint-clean
    dimension: correctness
    description: "Clippy must report zero errors"
    severity: error
    metric: lint_errors
    threshold: 0

  - id: test-pass
    dimension: testability
    description: "All tests must pass"
    severity: error
    metric: test_failures
    threshold: 0

  - id: no-todos
    dimension: readability
    description: "No TODO/FIXME comments in certified code"
    severity: warning
    metric: todo_count
    threshold: 0
    exclude_patterns: ["*_test.rs"]

  - id: max-complexity
    dimension: maintainability
    description: "Cyclomatic complexity should be manageable"
    severity: warning
    metric: complexity
    threshold: 20
