name: Certification Weekly Report

on:
  schedule:
    - cron: '0 8 * * 1'  # 8 AM UTC every Monday
  workflow_dispatch:

concurrency:
  group: certify-weekly
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build certify
        run: |
          go build -ldflags "\
            -X main.Version=$(git describe --tags --always) \
            -X main.Commit=$(git rev-parse --short HEAD) \
            -X main.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o build/bin/certify ./cmd/certify/

      - name: Scan
        run: ./build/bin/certify scan

      - name: Full certification (deterministic)
        run: ./build/bin/certify certify --skip-agent --reset-queue

      - name: AI review (budget-capped)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: ./build/bin/certify certify --batch 100
        continue-on-error: true

      - name: Generate report
        run: ./build/bin/certify report

      - name: JSON report artifact
        run: ./build/bin/certify report --format json > weekly-report.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-certification-report
          path: weekly-report.json

      - name: Commit updated records
        run: |
          git config user.name "certify[bot]"
          git config user.email "certify@users.noreply.github.com"
          git add .certification/REPORT_CARD.md .certification/badge.json .certification/reports/
          git diff --staged --quiet || git commit -m "chore: weekly full certification [skip ci]"
          git push
