name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/ci.yml'
      - '.certification/config.yml'
      - '.certification/policies/**'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o build/bin/certify ./cmd/certify/

  certify:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build
        run: |
          go build -ldflags "\
            -X main.Version=$(git describe --tags --always) \
            -X main.Commit=$(git rev-parse --short HEAD) \
            -X main.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o build/bin/certify ./cmd/certify/

      - name: Certify changed files only
        run: |
          # CI has no records (gitignored) — this validates changed code
          # but cannot produce a full report card.
          # Full report cards are generated by nightly/weekly workflows
          # or locally via 'certify certify && certify report'.
          PREV=${{ github.event.before }}
          if [ "$PREV" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial push — certifying with batch limit"
            ./build/bin/certify scan
            ./build/bin/certify certify --skip-agent --batch 50
          else
            CHANGED=$(git diff --name-only "$PREV" HEAD -- '*.go' '*.ts' | head -200)
            if [ -z "$CHANGED" ]; then
              echo "No certifiable files changed — skipping"
              exit 0
            fi
            echo "Changed files: $(echo "$CHANGED" | wc -l)"
            ./build/bin/certify scan
            ./build/bin/certify certify --diff-base "$PREV" --skip-agent
          fi
