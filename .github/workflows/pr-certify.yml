name: Certification PR Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  certify-changed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for diff + git evidence

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build certify
        run: |
          go build -ldflags "\
            -X main.Version=0.1.0 \
            -X main.Commit=$(git rev-parse --short HEAD) \
            -X main.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o build/bin/certify ./cmd/certify/

      - name: Scan
        run: ./build/bin/certify scan

      - name: Certify changed files only
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: ./build/bin/certify certify --diff-base origin/main --reset-queue

      - name: Generate report
        run: ./build/bin/certify report --detailed

      - name: Post PR comment
        if: always()
        run: |
          COMMENT=$(./build/bin/certify review)
          echo "$COMMENT"
