# Certify — Configuration
mode: advisory
scope:
  include: []
  exclude:
    - vendor/**
    - node_modules/**
    - testdata/**
    - "**/*_test.go"
    - build/**
    - templates/**
    - website/**
    - vscode-certify/**
    - assets/**
    - specs/**
agent:
  enabled: true
  provider:
    type: openai-compatible
    base_url: http://localhost:11434/v1
  models:
    prescreen: qwen3:latest
    review: qwen3:latest
    scoring: qwen3:latest
expiry:
  default_window_days: 90
  min_window_days: 7
  max_window_days: 365
issues:
  enabled: false
